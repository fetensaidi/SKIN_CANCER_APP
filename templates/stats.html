<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SkinAI - Statistiques</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            font-family: 'Segoe UI', sans-serif;
        }
        .navbar {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar-brand {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none;
        }
        .brand-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .brand-icon i { color: white; font-size: 16px; }
        .brand-name { color: white; font-size: 20px; font-weight: 800; }
        .back-btn {
            color: rgba(255,255,255,0.6);
            text-decoration: none; font-size: 14px;
            transition: color 0.3s;
        }
        .back-btn:hover { color: white; }
        .container { padding: 40px 35px; max-width: 1100px; margin: auto; }
        .page-title { color: white; margin-bottom: 30px; }
        .page-title h2 { font-size: 26px; font-weight: 700; }
        .page-title p { color: rgba(255,255,255,0.5); margin-top: 5px; }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
        }
        .stat-card.total::before  { background: linear-gradient(135deg, #667eea, #764ba2); }
        .stat-card.malin::before  { background: linear-gradient(135deg, #eb3349, #f45c43); }
        .stat-card.benin::before  { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .stat-icon {
            width: 55px; height: 55px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; margin: 0 auto 15px;
        }
        .stat-icon.purple { background: rgba(102,126,234,0.2); color: #667eea; }
        .stat-icon.red    { background: rgba(235,51,73,0.2);   color: #f45c43; }
        .stat-icon.green  { background: rgba(56,239,125,0.2);  color: #38ef7d; }
        .stat-number { color: white; font-size: 40px; font-weight: 800; }
        .stat-label  { color: rgba(255,255,255,0.5); font-size: 13px; margin-top: 5px; }
        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
        }
        .chart-card h3 {
            color: white; font-size: 15px;
            font-weight: 700; margin-bottom: 20px;
        }
        canvas { max-height: 250px; }
    </style>
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" href="/dashboard">
        <div class="brand-icon"><i class="fas fa-heartbeat"></i></div>
        <div><div class="brand-name">SkinAI</div></div>
    </a>
    <a href="/dashboard" class="back-btn">
        <i class="fas fa-arrow-left me-2"></i>Retour
    </a>
</nav>

<div class="container">
    <div class="page-title">
        <h2><i class="fas fa-chart-bar me-2"></i>Statistiques</h2>
        <p>Vue d'ensemble de vos diagnostics</p>
    </div>

    <!-- Stats Cards -->
    <div class="stats-grid">
        <div class="stat-card total">
            <div class="stat-icon purple">
                <i class="fas fa-users"></i>
            </div>
            <div class="stat-number">{{ total }}</div>
            <div class="stat-label">Total Patients Analysés</div>
        </div>
        <div class="stat-card malin">
            <div class="stat-icon red">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <div class="stat-number" style="color:#f45c43;">{{ malignant }}</div>
            <div class="stat-label">Cas Malignants</div>
        </div>
        <div class="stat-card benin">
            <div class="stat-icon green">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="stat-number" style="color:#38ef7d;">{{ benign }}</div>
            <div class="stat-label">Cas Bénins</div>
        </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
        <div class="chart-card">
            <h3><i class="fas fa-chart-pie me-2" style="color:#667eea;"></i>Répartition des Diagnostics</h3>
            <canvas id="donutChart"></canvas>
        </div>
        <div class="chart-card">
            <h3><i class="fas fa-chart-bar me-2" style="color:#38ef7d;"></i>Analyses des 7 derniers jours</h3>
            <canvas id="barChart"></canvas>
        </div>
    </div>
</div>

<script>
const donutCtx = document.getElementById('donutChart').getContext('2d');
new Chart(donutCtx, {
    type: 'doughnut',
    data: {
        labels: ['Malignant', 'Bénin'],
        datasets: [{
            data: [{{ malignant }}, {{ benign }}],
            backgroundColor: ['#f45c43', '#38ef7d'],
            borderColor: ['#eb3349', '#11998e'],
            borderWidth: 2
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                labels: { color: 'rgba(255,255,255,0.7)', font: { size: 13 } }
            }
        }
    }
});

const barCtx = document.getElementById('barChart').getContext('2d');
new Chart(barCtx, {
    type: 'bar',
    data: {
        labels: [{% for p in par_jour %}"{{ p.date }}"{% if not loop.last %},{% endif %}{% endfor %}],
        datasets: [{
            label: 'Analyses',
            data: [{% for p in par_jour %}{{ p.total }}{% if not loop.last %},{% endif %}{% endfor %}],
            backgroundColor: 'rgba(102,126,234,0.5)',
            borderColor: '#667eea',
            borderWidth: 2,
            borderRadius: 8
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { labels: { color: 'rgba(255,255,255,0.7)' } }
        },
        scales: {
            x: { ticks: { color: 'rgba(255,255,255,0.5)' }, grid: { color: 'rgba(255,255,255,0.05)' } },
            y: { ticks: { color: 'rgba(255,255,255,0.5)' }, grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true }
        }
    }
});
</script>
</body>
</html>
